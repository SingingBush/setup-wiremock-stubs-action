name: Setup Wiremock Stubs
description:
  Posts Wiremock stubs to a Wiremock server running in a container. This action
  is intended to be used in conjunction with wiremock running as a GH service
author: singingbush

# Add your action's branding here. This will appear on the GitHub Marketplace.
# See https://docs.github.com/en/actions/reference/workflows-and-actions/metadata-syntax#branding
branding:
  icon: command
  color: gray-dark

# Define your inputs here.
inputs:
  hostname:
    description: The host name for your Wiremock server. (defaults to localhost)
    required: true
    default: 'localhost'
  milliseconds:
    description: The number of milliseconds to wait before timing out.
    required: true
    default: '1000'

# Define your outputs here.
outputs:
  time:
    description: Your output description here

runs:
  using: node24
  # pre: 'dist/setup.js'
  main: dist/index.js
  # post: 'dist/cache-save/index.js'
  # post-if: success()
